# Self-contained Docker Compose for the Debezium MySQL source demo.
# Includes Feldera, RedPanda (Kafka), Kafka Connect (with Debezium MySQL source connector), and MySQL.
#
# Start:  docker compose up -d --build --wait
# Stop:   docker compose down -v

services:
  feldera:
    image: images.feldera.com/feldera/pipeline-manager:latest
    pull_policy: always
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v0/pipelines || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "19092:19092"
      - "18081:18081"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka-connect:
    build:
      context: ../
      dockerfile: .docker/Dockerfile.kafka-connect
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "redpanda:9092"
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: "inventory.configs"
      OFFSET_STORAGE_TOPIC: "inventory.offset"
      STATUS_STORAGE_TOPIC: "inventory.status"
      LOG_LEVEL: "ERROR"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  mysql:
    image: debezium/example-mysql:2.5
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: debezium
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpw
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e 'USE inventory;'"]
      interval: 5s
      timeout: 5s
      retries: 40
